# Publishes to PyPI on push of a v* tag (e.g. `git tag v0.1.0 && git push --tags`).
#
# Uses PyPI Trusted Publishing — no API token in secrets needed.
# One-time setup: https://pypi.org/manage/account/publishing/
#   PyPI project: odoo-rich-cli
#   Owner:        mdfarhankc
#   Repository:   odoo-rich-cli
#   Workflow:     publish.yml
#   Environment:  pypi   (matches the `environment:` key below)

name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v7
      - run: uv publish --trusted-publishing always
